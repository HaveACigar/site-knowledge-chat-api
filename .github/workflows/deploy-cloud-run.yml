name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'meta-method-216117' }}
  REGION: us-central1
  SERVICE_NAME: site-knowledge-chat-api
  OPENAI_MODEL: gpt-4.1-mini
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || 'react-contact-form-26c58' }}
  ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS || 'https://www.arieswebsite.com,https://arieswebsite.com' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/1044248854820/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@meta-method-216117.iam.gserviceaccount.com"
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Build and push container image
        run: |
          BUILD_OUTPUT=$(gcloud builds submit --project "$PROJECT_ID" --tag "gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA" --timeout=2400s --async . 2>&1)
          echo "$BUILD_OUTPUT"
          BUILD_ID=$(printf '%s\n' "$BUILD_OUTPUT" | sed -n 's|.*builds/\([A-Za-z0-9-]*\).*|\1|p' | head -1)
          if [ -z "$BUILD_ID" ]; then exit 1; fi
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --project "$PROJECT_ID" --format='value(status)')
            echo "Cloud Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "EXPIRED" ]; then
              gcloud builds describe "$BUILD_ID" --project "$PROJECT_ID" --format='yaml(status,logUrl,results,images)'
              exit 1
            fi
            sleep 15
          done
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --max-instances 3 \
            --timeout 300 \
            --set-env-vars "^|^OPENAI_MODEL=$OPENAI_MODEL|FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID|ALLOWED_ORIGINS=$ALLOWED_ORIGINS" \
            --set-secrets "OPENAI_API_KEY=OPENAI_API_KEY:latest"
      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          echo "Cloud Run URL: $URL"
